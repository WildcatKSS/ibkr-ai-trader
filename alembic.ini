[alembic]
# Path to migration scripts, relative to this file.
script_location = db/migrations

# The database URL is built at runtime from environment variables in
# db/migrations/env.py — do not set sqlalchemy.url here.
sqlalchemy.url =

# Template for new migration files.
file_template = %%(rev)s_%%(slug)s

# Timezone used for revision file timestamps.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
